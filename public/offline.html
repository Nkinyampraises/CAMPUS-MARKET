<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You're offline — UNITRADE</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #FFFFFF;
        color: #14211b;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        width: 100%;
        text-align: center;
        border: 1px solid #e3e8e5;
        border-radius: 20px;
        padding: 32px 24px;
        box-shadow: 0 12px 40px rgba(0, 90, 48, 0.08);
      }
      .badge {
        width: 64px; height: 64px;
        margin: 0 auto 16px;
        border-radius: 18px;
        background: #e9f5ee;
        display: flex; align-items: center; justify-content: center;
      }
      h1 { font-size: 22px; margin: 0 0 8px; color: #005A30; }
      p { font-size: 14px; line-height: 1.6; color: #51605a; margin: 0 0 20px; }
      button {
        background: #00843C; color: #fff; border: 0;
        font-size: 15px; font-weight: 700;
        padding: 12px 24px; border-radius: 12px; cursor: pointer;
      }
      button:hover { background: #005A30; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#005A30" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 1l22 22" />
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
          <line x1="12" y1="20" x2="12.01" y2="20" />
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>UNITRADE can't reach the internet right now. Pages you've already visited are still available. Check your connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
